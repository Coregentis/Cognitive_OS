version_stream: "v0"
binding_matrix_id: "mplp-coregentis-binding-matrix-v0"
status: "draft"
phase: "binding-draft"
authority_statement: "This matrix defines the first machine-readable binding bridge between MPLP protocol semantics and Coregentis runtime semantics. It preserves protocol recoverability without collapsing protocol and runtime into one layer."
runtime_substrate_hint_policy: "informational_only"
runtime_substrate_hint_note: "runtime_substrate_hint and runtime_substrate_note are bridge annotations only. They do not select or implement runtime architecture."

binding_class_vocabulary:
  - "shallow_reconstructable_runtime_bound"
  - "protocol_adjacent_but_not_exportable"
  - "runtime_private_only"
  - "export_restricted_internal"

