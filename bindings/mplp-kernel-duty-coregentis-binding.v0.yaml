version: "0.1"
status: "baseline"
authority_order:
  - MPLP
  - Cognitive_OS
  - Product_Projections
source:
  protocol_version: "1.0.0"
  kernel_duty_source: "schemas/v2/taxonomy/kernel-duties.yaml"
duties:
  - id: "KD-01"
    name: "Coordination"
    slug: "coordination"
    cognitive_os_responsibility: "Coordinate registered runtime objects, policy checks, continuation anchors, and bounded handoffs without downstream workflow semantics."
    owner_services:
      - "MinimalRuntimeOrchestratorSkeleton"
      - "RegistryService"
      - "BindingService"
      - "planned:CoordinationDutyPostureService"
    runtime_object_families:
      - "project"
      - "objective"
      - "work-item"
      - "review-cycle"
      - "agent-worker"
      - "management-family-records"
    evidence_posture: "Coordination decisions that affect continuation or handoff posture must leave safe decision or trace references."
    projection_safe_exposure: "Expose bounded coordination summaries, source references, and runtime-private omission markers only."
    product_boundary_rule: "Downstream products may name workflows, but Cognitive_OS owns neutral coordination posture."
    implementation_status: "partial"
    notes: "Current orchestration and registry/binding services provide reusable substrate; a dedicated duty-posture service is planned only if needed."

  - id: "KD-02"
    name: "Error Handling"
    slug: "error-handling"
    cognitive_os_responsibility: "Represent recoverable runtime gaps, blocked states, stale context, and evidence insufficiency without product verdict semantics."
    owner_services:
      - "ProjectionService"
      - "PolicyService"
      - "ReconcileService"
      - "planned:ErrorDutyPostureService"
    runtime_object_families:
      - "conflict-case"
      - "drift-record"
      - "decision-record"
      - "trace-evidence"
      - "projection-revision-envelope"
    evidence_posture: "Error posture must distinguish insufficiency, stale state, conflict, and policy block with safe evidence references."
    projection_safe_exposure: "Expose bounded error and insufficiency summaries; never expose raw runtime-private payloads."
    product_boundary_rule: "Downstream products may render error copy but must preserve neutral error posture."
    implementation_status: "partial"
    notes: "Projection revision, evidence insufficiency, and policy blocks already cover the core posture."

  - id: "KD-03"
    name: "Event Bus"
    slug: "event-bus"
    cognitive_os_responsibility: "Preserve neutral event and timeline posture for runtime steps without requiring a downstream event bus."
    owner_services:
      - "RuntimeOrchestrator"
      - "TraceService"
      - "execution event surfaces"
      - "planned:EventDutyPostureService"
    runtime_object_families:
      - "runtime-event-timeline-entry"
      - "trace-evidence"
      - "decision-record"
      - "action-unit"
    evidence_posture: "Events that affect runtime state or export posture must be traceable by id or reference, not treated as proof."
    projection_safe_exposure: "Expose event summaries and references only; omit internal dispatch mechanics."
    product_boundary_rule: "Downstream products may create local histories, but not redefine Cognitive_OS event semantics."
    implementation_status: "implicit"
    notes: "The current runtime has timeline and execution-event substrate, not a full general event bus."

  - id: "KD-04"
    name: "Learning Feedback"
    slug: "learning-feedback"
    cognitive_os_responsibility: "Capture neutral correction, preference, and learning-candidate posture without automatic global learning or training semantics."
    owner_services:
      - "CorrectionCapturePort"
      - "PreferenceWritebackService"
      - "governed learning path"
      - "planned:LearningDutyPostureService"
    runtime_object_families:
      - "learning-candidate"
      - "preference-profile"
      - "memory-promotion-record"
      - "objective"
    evidence_posture: "Feedback evidence must identify source correction or preference references and whether learning is candidate, accepted, rejected, or deferred."
    projection_safe_exposure: "Expose suggestion and candidate posture only; no raw training data or automatic mutation claim."
    product_boundary_rule: "Downstream products may surface feedback loops but cannot promote them into Cognitive_OS product law."
    implementation_status: "partial"
    notes: "Current correction and preference writeback services provide neutral first-pass coverage."

  - id: "KD-05"
    name: "Observability"
    slug: "observability"
    cognitive_os_responsibility: "Preserve trace, evidence, omission, and export-preparation posture for runtime and projection surfaces."
    owner_services:
      - "TraceService"
      - "ProjectionService"
      - "FrozenBindingService"
      - "protocol export support"
      - "planned:ObservabilityDutyPostureService"
    runtime_object_families:
      - "trace-evidence"
      - "decision-record"
      - "evidence-summary"
      - "projection-envelope"
    evidence_posture: "Evidence is referenceable summary, not proof or certification; omission must be explicit."
    projection_safe_exposure: "Expose evidence references, bounded summaries, confidence or insufficiency posture, and omission markers only."
    product_boundary_rule: "Downstream products may format observability, but must not claim proof, certification, or hidden runtime truth."
    implementation_status: "explicit"
    notes: "Trace and projection-safe evidence posture are already first-class runtime concerns."

  - id: "KD-06"
    name: "Orchestration"
    slug: "orchestration"
    cognitive_os_responsibility: "Run or plan ordered runtime service steps while preserving registry and binding authority and avoiding product workflow law."
    owner_services:
      - "MinimalRuntimeOrchestratorSkeleton"
      - "FormService"
      - "MemoryService"
      - "ActivationService"
      - "ConfirmService"
      - "TraceService"
      - "ReconcileService"
      - "ConsolidationService"
    runtime_object_families:
      - "external-input-record"
      - "intent"
      - "activation-signal"
      - "confirm-gate"
      - "trace-evidence"
      - "conflict-case"
    evidence_posture: "Orchestration must produce enough trace or decision posture to reconstruct bounded step outcomes."
    projection_safe_exposure: "Expose step summaries and safe outcome posture, not internal runtime control payloads."
    product_boundary_rule: "Downstream products may compose journeys from orchestration outputs but do not own orchestration law."
    implementation_status: "explicit"
    notes: "The minimal loop provides an explicit ordered runtime skeleton."

  - id: "KD-07"
    name: "Performance"
    slug: "performance"
    cognitive_os_responsibility: "Maintain deterministic bounded runtime behavior and future measurable posture without declaring downstream service-level objectives."
    owner_services:
      - "state stores"
      - "in-memory stores"
      - "SQLiteStateStore"
      - "planned:PerformanceDutyPostureService"
    runtime_object_families:
      - "store-snapshot"
      - "runtime-state-projection"
      - "runtime-object-record"
    evidence_posture: "Performance posture should be auditable through deterministic tests, bounded record counts, and timing notes where needed."
    projection_safe_exposure: "Expose bounded performance indicators only when defined; no product readiness guarantee."
    product_boundary_rule: "Downstream products may set their own UX targets but cannot treat them as Cognitive_OS duty semantics."
    implementation_status: "implicit"
    notes: "Current deterministic stores support private runtime confidence; no formal performance duty service exists yet."

  - id: "KD-08"
    name: "Protocol Versioning"
    slug: "protocol-versioning"
    cognitive_os_responsibility: "Preserve protocol-source, binding-version, export-rule, and runtime-version boundaries without changing MPLP."
    owner_services:
      - "FrozenBindingService"
      - "FrozenRegistryService"
      - "frozen truth loader"
      - "release governance"
    runtime_object_families:
      - "protocol-binding-ref"
      - "registry-entry"
      - "export-rule"
      - "import-lock"
    evidence_posture: "Version posture must cite source versions and distinguish protocol truth from runtime interpretation."
    projection_safe_exposure: "Expose version references and binding references only; do not imply protocol updates or certification."
    product_boundary_rule: "Downstream products consume version posture but cannot claim MPLP changes or endorsement."
    implementation_status: "partial"
    notes: "Existing binding, registry, export, and import-lock artifacts preserve version boundaries."

  - id: "KD-09"
    name: "Security"
    slug: "security"
    cognitive_os_responsibility: "Keep runtime-private state private, enforce omission, restrict exportability, and prevent unsafe side-effect semantics from leaking into projections."
    owner_services:
      - "ProjectionService"
      - "FrozenBindingService"
      - "export rules"
      - "execution boundary contract"
      - "planned:SecurityDutyPostureService"
    runtime_object_families:
      - "runtime-private-object-families"
      - "projection-envelope"
      - "execution-boundary-envelope"
      - "export-rule"
    evidence_posture: "Security evidence must show omission, rejection, or non-exportability posture where relevant."
    projection_safe_exposure: "Expose only safe fields and explicit omission markers; reject forbidden raw, private, or export fields."
    product_boundary_rule: "Downstream products may consume safe envelopes only and must not request raw runtime law as product DTOs."
    implementation_status: "partial"
    notes: "Projection and export rules already enforce key private-field and non-exportability boundaries."

  - id: "KD-10"
    name: "State Sync"
    slug: "state-sync"
    cognitive_os_responsibility: "Maintain project-scoped runtime state, continuity, snapshot, replay, and projection consistency across neutral stores."
    owner_services:
      - "VslService"
      - "VSL store"
      - "state stores"
      - "projection store"
      - "RuntimeOrchestrator"
      - "planned:StateSyncDutyPostureService"
    runtime_object_families:
      - "project"
      - "objective"
      - "work-item"
      - "continuity-state"
      - "lifecycle-projection"
      - "snapshot"
    evidence_posture: "State-sync evidence must show project scope, continuity id, source references, and omission posture."
    projection_safe_exposure: "Expose continuity and snapshot summaries, not raw VSL, PSG, or Trace payloads."
    product_boundary_rule: "Downstream products may store product-local state, but Cognitive_OS owns neutral state-sync posture."
    implementation_status: "partial"
    notes: "VSL and projection-safe continuity surfaces provide reusable first-pass coverage."

  - id: "KD-11"
    name: "Transaction"
    slug: "transaction"
    cognitive_os_responsibility: "Preserve deterministic commit, rollback, snapshot, and export consistency posture for runtime changes without claiming full distributed transactions."
    owner_services:
      - "state stores"
      - "SQLiteStateStore"
      - "projection store"
      - "planned:TransactionDutyPostureService"
    runtime_object_families:
      - "state-snapshot"
      - "runtime-object-record"
      - "export-preparation-summary"
      - "decision-record"
    evidence_posture: "Transaction evidence must record accepted, blocked, rolled back, or exported snapshot posture where available."
    projection_safe_exposure: "Expose commit and snapshot posture only as bounded summary; do not expose internal store payloads."
    product_boundary_rule: "Downstream products may require consistent packets or workspaces but must consume neutral transaction posture."
    implementation_status: "implicit"
    notes: "Current stores provide deterministic behavior; a formal transaction posture remains planned."
